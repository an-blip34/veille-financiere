<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif}
.mc{background:#0a0a0f;color:#e8e8e8;padding:20px;min-height:100vh}
.header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #222}
.title{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.5px}
.subtitle{font-size:12px;color:#666;margin-top:4px}
.top-metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.metric{background:#12121a;border:1px solid #222;border-radius:10px;padding:14px}
.metric-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.source-list{display:flex;flex-direction:column;gap:4px}
.source-item{font-size:11px;color:#888;display:flex;align-items:center;gap:6px}
.source-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;flex-shrink:0}
.rep-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rep-row:last-child{margin-bottom:0}
.rep-name{font-size:12px;font-weight:600;width:110px;flex-shrink:0}
.rep-bar-wrap{flex:1;height:5px;background:#1e1e2a;border-radius:3px}
.rep-bar{height:5px;border-radius:3px}
.rep-count{font-size:11px;color:#555;width:24px;text-align:right;flex-shrink:0}
.filter-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
.pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .2s;opacity:.6}
.pill:hover{opacity:.85;transform:scale(1.05)}
.pill.active{opacity:1;transform:scale(1.08);border-width:2px}
.articles-section{background:#12121a;border:1px solid #222;border-radius:10px;padding:16px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:12px;color:#555;text-transform:uppercase;letter-spacing:.06em}
.article-row{display:flex;align-items:flex-start;gap:10px;padding:10px 8px;border-bottom:1px solid #1a1a24;border-radius:6px;text-decoration:none}
.article-row:hover{background:#16161e}
.article-row:last-child{border-bottom:none}
.theme-stripe{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:40px}
.art-title{font-size:13px;color:#ddd;line-height:1.4;font-weight:500}
.art-resume{font-size:11px;color:#888;margin-top:4px;line-height:1.4}
.art-meta{font-size:11px;margin-top:6px;display:flex;align-items:center;flex-wrap:wrap;gap:5px}
.src-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:#1e1e2a;color:#bbb;font-weight:700}
.date-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:#0a1a2a;color:#38bdf8;font-weight:700}
</style>
</head>

grave crise du carburant qui touche durement le pays."},{"titre":"La richesse d'une nation ne garantit pas nécessairement la longévité ou la tranquillité de ses habitants","lien":"https://www.lemonde.fr/idees/article/2026/04/04/la-richesse-d-une-nation-ne-garantit-pas-necessairement-la-longevite-ou-la-tranquillite-de-ses-habitants_6676660_3232.html","source":"Le Monde - Économie","date":"2026-04-04","theme":"Macro-économie","resume":"L'analyse souligne que la prospérité économique d'un pays ne se traduit pas automatiquement par une meilleure qualité de vie pour ses citoyens en termes de santé et de bien-être."},{"titre":"La Chine, l'autre pays du foie gras","lien":"https://www.lemonde.fr/economie/article/2026/04/04/la-chine-l-autre-pays-du-foie-gras_6676655_3234.html","source":"Le Monde - Économie","date":"2026-04-04","theme":"Entreprises","resume":"La Chine s'impose comme un acteur majeur dans la production et la consommation de foie gras, traditionnellement associé à la gastronomie française."},{"titre":"À Saint-Denis, la police municipale en attente d'éclaircissements de la part de Bally Bagayoko","lien":"https://www.lemonde.fr/societe/article/2026/04/04/a-saint-denis-la-police-municipale-en-attente-d-eclaircissements-de-la-part-de-bally-bagayoko_6676656_3224.html","source":"Le Monde - Économie","date":"2026-04-04","theme":"Macro-économie","resume":"La police municipale de Saint-Denis attend des clarifications de la part de Bally Bagayoko concernant sa situation."},{"titre":"« Je me sentais comme une esclave » : les étudiants étrangers piégés dans le travail non déclaré","lien":"https://www.lemonde.fr/campus/article/2026/04/04/je-me-sentais-comme-une-esclave-les-etudiants-etrangers-pieges-dans-le-travail-non-declare_6676630_4401467.html","source":"Le Monde - Économie","date":"2026-04-04","theme":"Macro-économie","resume":"Des étudiants étrangers se retrouvent piégés dans des situations de travail non déclaré, s'apparentant à des formes d'exploitation moderne."},{"titre":"Vivons-nous un quatrième choc pétrolier ? Comprendre en trois minutes","lien":"https://www.lemonde.fr/comprendre-en-3-minutes/video/2026/04/04/vivons-nous-un-quatrieme-choc-petrolier-comprendre-en-trois-minutes_6676626_6176282.html","source":"Le Monde - Économie","date":"2026-04-04","theme":"Énergie","resume":"Une analyse de la situation actuelle du marché pétrolier pour déterminer si nous traversons un quatrième choc pétrolier comparable à ceux de 1973, 1979 et 2008."},{"titre":"Défiscalisation : la société Stellium Immobilier condamnée pour manquement au devoir de conseil","lien":"https://www.lemonde.fr/argent/article/2026/04/04/defiscalisation-la-societe-stellium-immobilier-condamnee-pour-manquement-au-devoir-de-conseil_6676623_1657007.html","source":"Le Monde - Économie","date":"2026-04-04","theme":"Fiscalité","resume":"La société Stellium Immobilier a été condamnée pour n'avoir pas respecté son obligation de conseil envers ses clients dans le cadre d'opérations de défiscalisation immobilière."},{"titre":"Avec le rassemblement de Saint-Denis à l'appel de Bally Bagayoko, l'espoir d'un retour de la lutte antiraciste dans le débat public","lien":"https://www.lemonde.fr/societe/article/2026/04/04/avec-le-rassemblement-de-saint-denis-a-l-appel-de-bally-bagayoko-l-espoir-d-un-retour-de-la-lutte-antiraciste-dans-le-debat-public_6676621_3224.html","source":"Le Monde - Économie","date":"2026-04-04","theme":"Macro-économie","resume":"Un rassemblement organisé à Saint-Denis à l'appel de Bally Bagayoko vise à replacer la lutte antiraciste au cœur du débat public français."},{"titre":"Dominique Méda, sociologue : les leçons de Lionel Jospin et de Jürgen Habermas","lien":"https://www.lemonde.fr/idees/article/2026/04/04/dominique-meda-sociologue-les-lecons-de-lionel-jospin-et-de-jurgen-habermas_6676586_3232.html","source":"Le Monde - Économie","date":"2026-04-04","theme":"Macro-économie","resume":"La sociologue Dominique Méda propose une réflexion sur les enseignements des pensées de l'ancien Premier ministre Lionel Jospin et du philosophe allemand Jürgen Habermas."},{"titre":"La carte des prix des carburants dans toutes les stations service de France","lien":"https://www.lemonde.fr/les-decodeurs/article/2026/04/04/la-carte-des-prix-des-carburants-dans-toutes-les-stations-service-de-france_6670140_4355771.html","source":"Le Monde - Économie","date":"2026-04-04","theme":"Énergie","resume":"Le Monde propose une cartographie interactive permettant de visualiser les prix des carburants pratiqués dans l'ensemble des stations-service sur le territoire français."},{"titre":"Hausse des prix des carburants : le gouvernement lance un prêt flash à 3,80 % pour soutenir la trésorerie des TPE et PME","lien":"https://www.lemonde.fr/economie/article/2026/04/04/hausse-des-prix-des-carburants-le-gouvernement-lance-un-pret-flash-a-3-80-pour-soutenir-la-tresorerie-des-tpe-et-pme_6676416_3234.html","source":"Le Monde - Économie","date":"2026-04-04","theme":"Entreprises","resume":"Face à la hausse des prix des carburants, le gouvernement met en place un dispositif de prêt flash à taux préférentiel de 3,80 % destiné à soutenir la trésorerie des très petites entreprises et des petites et moyennes entreprises."},{"titre":"Titre manquant","lien":"","source":"","date":"","theme":"Macro-économie","resume":"Aucun contenu fourni pour analyse."}];
const couleurs = {"Énergie":{"hex":"#f59e0b"},"Marchés":{"hex":"#38bdf8"},"Entreprises":{"hex":"#818cf8"},"Macro-économie":{"hex":"#22c55e"},"Fiscalité":{"hex":"#888780"}};

function render(filter) {
  const filtered = filter === 'all' ? data : data.filter(a => (a.theme || 'Macro-économie') === filter);
  document.getElementById('art-count').textContent = filtered.length + ' résultats';
  document.getElementById('art-list').innerHTML = filtered.map(a => {
    const c = couleurs[a.theme] || { hex: '#888780' };
    return `<a class="article-row" href="${a.lien}" target="_blank">
      <div class="theme-stripe" style="background:${c.hex}"></div>
      <div style="flex:1;min-width:0">
        <div class="art-title">${a.titre}</div>
        ${a.resume ? `<div class="art-resume">${a.resume}</div>` : ''}
        <div class="art-meta">
          <span class="src-pill">${a.source || ''}</span>
          <span style="font-size:10px;padding:2px 7px;border-radius:10px;background:${c.hex}22;color:${c.hex};border:1px solid ${c.hex}44;font-weight:700">${a.theme}</span>
          ${a.date ? `<span class="date-pill">${a.date}</span>` : ''}
        </div>
      </div>
    </a>`;
  }).join('');
}

document.getElementById('pills').addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  const color = pill.dataset.color;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.remove('active');
    const c = p.dataset.color;
    p.style.borderColor = c === '#fff' ? '#ffffff44' : c + '44';
    p.style.background = c === '#fff' ? '#ffffff11' : c + '11';
    p.style.opacity = '.6';
  });
  pill.classList.add('active');
  pill.style.borderColor = color;
  pill.style.background = color === '#fff' ? '#ffffff22' : color + '22';
  pill.style.opacity = '1';
  render(pill.dataset.f);
});

const firstPill = document.querySelector('.pill');
if (firstPill) {
  firstPill.classList.add('active');
  firstPill.style.borderColor = firstPill.dataset.color;
  firstPill.style.background = firstPill.dataset.color + '22';
  firstPill.style.opacity = '1';
  render(firstPill.dataset.f);
}
</script>
