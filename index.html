const couleurs = {"Énergie":{"bg":"#FAEEDA","border":"#BA7517","text":"#633806","dot":"#BA7517"},"Marchés":{"bg":"#E6F1FB","border":"#378ADD","text":"#0C447C","dot":"#378ADD"},"Entreprises":{"bg":"#EEEDFE","border":"#7F77DD","text":"#3C3489","dot":"#7F77DD"},"Macro-économie":{"bg":"#EAF3DE","border":"#639922","text":"#27500A","dot":"#1D9E75"},"Fiscalité":{"bg":"#F1EFE8","border":"#888780","text":"#444441","dot":"#888780"}};

function importance(n) {
  return '●'.repeat(n) + '○'.repeat(3 - n);
}

function render(filter) {
  const filtered = filter === 'all' ? data : data.filter(a => (a.theme || 'Macro-économie') === filter);
  const parTheme = {};
  for (const a of filtered) {
    const t = a.theme || 'Macro-économie';
    if (!parTheme[t]) parTheme[t] = [];
    parTheme[t].push(a);
  }
  const container = document.getElementById('articles');
  container.innerHTML = Object.entries(parTheme).map(([theme, arts]) => {
    const c = couleurs[theme] || couleurs['Macro-économie'];
    const lignes = arts.sort((a, b) => (b.importance || 0) - (a.importance || 0)).map(a => `
      <div class="article-item">
        <div class="article-dot" style="background:${c.dot};"></div>
        <div style="flex:1;">
          <a class="article-link" href="${a.lien}" target="_blank">${a.titre}</a>
          <div class="article-resume">${a.resume || ''}</div>
          <div class="article-meta">${a.source || ''}</div>
        </div>
        <div class="importance" style="color:${c.text};">${importance(a.importance || 1)}</div>
      </div>
    `).join('');
    return `
      <div class="theme-block">
        <div class="theme-header" style="background:${c.bg};border-left:4px solid ${c.border};">
          <span style="font-size:14px;font-weight:700;color:${c.text};">${theme}</span>
          <span class="theme-count" style="color:${c.text};">${arts.length} article${arts.length > 1 ? 's' : ''}</span>
        </div>
        ${lignes}
      </div>
    `;
  }).join('');
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(btn.dataset.filter);
});

render('all');
</script>
